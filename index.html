.ps.active{color:var(--gold);border-bottom-color:var(--gold);}
.ps.done{color:var(--charcoal-soft);border-bottom-color:var(--charcoal-soft);}
.panel{display:none;animation:fi .2s ease;}

.full{grid-column:1/-1;}

.svc-info{flex:1;}

.review-box{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:22px;margin-bottom:24px;}

.rv-val{font-size:13px;color:var(--charcoal);flex:1;line-height:1.5;}

.btn-p:hover{background:var(--gold-light);}
.btn-s{background:none;color:var(--text-muted);border:1px solid var(--border);padding:12px 22px;border-radius:5px;font-family:'DM Sans',sans-serif;font-size:11.5px;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:all .18s;}
.btn-s:hover{border-color:var(--gold);color:var(--gold);}
.status{display:none;margin-top:18px;padding:14px 18px;border-radius:var(--r);font-size:13px;font-weight:500;}
.success{text-align:center;padding:60px 24px;}
.success .ck{font-size:52px;margin-bottom:18px;}

.success p{font-size:13px;color:var(--text-muted);max-width:400px;margin:0 auto;line-height:1.7;}
.footer{background:var(--charcoal);padding:22px;text-align:center;font-size:10px;color:var(--text-muted);letter-spacing:0.1em;}
